<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TalentIQ — HR Screening Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ═══ THEME TOKENS ═══ */
[data-theme="light"]{
  --bg:#F0F2F5;--sidebar:#FFFFFF;--card:#FFFFFF;--surface:#F7F8FA;--surface2:#EEF0F3;
  --border:#E3E6EC;--border2:#CDD2DB;
  --accent:#4F6EF7;--accent-d:#3A57E8;--accent-l:#EEF1FF;--accent-m:#C7D0FB;
  --green:#0A9272;--green-l:#E6F7F4;--green-m:#9FE0D4;
  --red:#E0382A;--red-l:#FEF0EF;
  --yellow:#C07A10;--yellow-l:#FEF7EC;
  --purple:#6E40C9;--purple-l:#F1ECFE;
  --text:#111827;--text2:#4B5563;--text3:#9CA3AF;
  --shadow:0 1px 4px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 12px 32px rgba(0,0,0,0.1);
  --overlay:rgba(17,24,39,0.4);
  --input-bg:#F7F8FA;--input-focus:#FFFFFF;
  --topbar-bg:#FFFFFF;
}
[data-theme="dark"]{
  --bg:#0E1117;--sidebar:#13171F;--card:#1A1F2B;--surface:#1F2535;--surface2:#252B3B;
  --border:#2A3145;--border2:#3A4460;
  --accent:#6B8DF7;--accent-d:#5579F5;--accent-l:#1C2347;--accent-m:#2D3D7A;
  --green:#0FC99A;--green-l:#0D2B24;--green-m:#0A5445;
  --red:#F06F65;--red-l:#2C1412;
  --yellow:#F5C24A;--yellow-l:#2B2208;
  --purple:#A780FA;--purple-l:#1F1538;
  --text:#E8EBF0;--text2:#8B95A8;--text3:#505A6E;
  --shadow:0 1px 4px rgba(0,0,0,0.3),0 1px 2px rgba(0,0,0,0.2);
  --shadow-md:0 4px 16px rgba(0,0,0,0.35);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.5);
  --overlay:rgba(0,0,0,0.65);
  --input-bg:#1F2535;--input-focus:#252B3B;
  --topbar-bg:#13171F;
}

body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;height:100vh;overflow:hidden;display:flex;font-size:14px;line-height:1.5;transition:background 0.2s,color 0.2s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ═══ AUTH ═══ */
.auth-page{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
[data-theme="light"] .auth-page{background:linear-gradient(145deg,#EEF1FF 0%,#F7F8FF 40%,#F0F2F5 100%)}
[data-theme="dark"] .auth-page{background:linear-gradient(145deg,#0E1117 0%,#141824 100%)}
.auth-box{width:440px}
.auth-logo{text-align:center;margin-bottom:30px}
.auth-brand{display:inline-flex;align-items:center;gap:10px;margin-bottom:8px}
.auth-icon{width:40px;height:40px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;box-shadow:0 4px 12px rgba(79,110,247,0.35)}
.auth-logo-name{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-0.5px}
.auth-logo-sub{font-size:13px;color:var(--text3);font-family:'DM Mono',monospace}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px;box-shadow:var(--shadow-lg)}
.auth-title{font-size:19px;font-weight:700;color:var(--text);margin-bottom:5px}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.55}
.auth-label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;margin-top:14px;text-transform:uppercase;letter-spacing:0.5px}
.auth-input{width:100%;background:var(--input-bg);border:1.5px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--text);font-family:'Manrope',sans-serif;font-size:14px;outline:none;transition:all 0.15s}
.auth-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-m);background:var(--input-focus)}
.auth-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:12px;font-family:'Manrope',sans-serif;font-weight:700;font-size:14px;cursor:pointer;margin-top:18px;transition:all 0.15s;letter-spacing:0.2px}
.auth-btn:hover{background:var(--accent-d);transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,110,247,0.4)}
.auth-btn:active{transform:translateY(0)}
.auth-btn:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed;transform:none;box-shadow:none}
.auth-error{background:var(--red-l);border:1px solid var(--red);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--red);margin-bottom:14px}
.auth-switch{text-align:center;margin-top:18px;font-size:13px;color:var(--text2)}
.auth-switch span{color:var(--accent);cursor:pointer;font-weight:700}
.auth-switch span:hover{text-decoration:underline}
.setup-note{background:var(--yellow-l);border:1px solid var(--yellow);border-radius:10px;padding:14px;margin-top:16px;font-size:12px;color:var(--yellow);line-height:1.8}
.setup-note a{color:var(--accent)}

/* ═══ LAYOUT ═══ */
.sidebar{width:242px;min-width:242px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:background 0.2s}
.sidebar-top{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:33px;height:33px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0;box-shadow:0 2px 6px rgba(79,110,247,0.3)}
.logo-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.3px}
.logo-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}
.nav{padding:10px 8px;flex:1;overflow-y:auto}
.nav-sec{padding:10px 10px 5px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all 0.12s;border-radius:8px;margin-bottom:1px}
.nav-item:hover{color:var(--text);background:var(--surface)}
.nav-item.active{color:var(--accent);background:var(--accent-l);font-weight:600}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-new{margin:0 8px 10px;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 14px;font-family:'Manrope',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:7px;justify-content:center;box-shadow:0 2px 6px rgba(79,110,247,0.25)}
.nav-new:hover{background:var(--accent-d);box-shadow:0 4px 10px rgba(79,110,247,0.4);transform:translateY(-1px)}
.model-pill{margin:0 8px 8px;padding:8px 11px;background:var(--green-l);border:1px solid var(--green-m);border-radius:8px}
.model-pill-name{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--green);letter-spacing:0.3px}
.model-pill-sub{font-size:10px;color:var(--green);opacity:0.7;margin-top:1px}
.user-panel{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px}
.u-avatar{width:31px;height:31px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#fff}
.u-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-email{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.logout-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:5px;flex-shrink:0;transition:color 0.15s;border-radius:5px;line-height:1}
.logout-btn:hover{color:var(--red);background:var(--red-l)}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.topbar{padding:0 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;height:55px;background:var(--topbar-bg);flex-shrink:0;transition:background 0.2s}
.topbar-title{font-size:14px;font-weight:700;color:var(--text)}
.topbar-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.topbar-sep{color:var(--border2);font-size:16px;line-height:1}
.content{flex:1;overflow-y:auto;padding:22px 24px}

/* ═══ THEME TOGGLE ═══ */
.theme-toggle{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text2);transition:all 0.15s;white-space:nowrap}
.theme-toggle:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:var(--overlay);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);padding:28px;max-width:540px;width:90%;animation:slideUp 0.2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.55}

/* ═══ COMPONENTS ═══ */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow)}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px}
.sec-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px}
.btn{border:none;border-radius:8px;padding:9px 16px;font-family:'Manrope',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-d);transform:translateY(-1px);box-shadow:0 3px 8px rgba(79,110,247,0.35)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{background:transparent;color:var(--accent);border:1.5px solid var(--accent-m)}
.btn-outline:hover{background:var(--accent-l)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{opacity:0.88}
.btn-danger{background:transparent;color:var(--red);border:1.5px solid var(--red)}
.btn-danger:hover{background:var(--red-l)}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--surface);color:var(--text);border-color:var(--border2)}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:7px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}
.input{background:var(--input-bg);border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-family:'Manrope',sans-serif;font-size:14px;outline:none;transition:all 0.15s;width:100%}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-m);background:var(--input-focus)}
.textarea{resize:vertical;min-height:130px;line-height:1.6}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace;gap:4px;white-space:nowrap}
.badge-blue{background:var(--accent-l);color:var(--accent);border:1px solid var(--accent-m)}
.badge-green{background:var(--green-l);color:var(--green);border:1px solid var(--green-m)}
.badge-red{background:var(--red-l);color:var(--red);border:1px solid var(--red)}
.badge-yellow{background:var(--yellow-l);color:var(--yellow);border:1px solid var(--yellow)}
.badge-purple{background:var(--purple-l);color:var(--purple);border:1px solid var(--purple)}
.badge-gray{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.info-box{background:var(--accent-l);border:1px solid var(--accent-m);border-radius:9px;padding:11px 14px;font-size:13px;line-height:1.6;color:var(--accent)}
.success-box{background:var(--green-l);border:1px solid var(--green-m);border-radius:9px;padding:11px 14px;font-size:13px;line-height:1.6;color:var(--green)}
.warn-box{background:var(--yellow-l);border:1px solid var(--yellow);border-radius:9px;padding:10px 14px;font-size:13px;color:var(--yellow)}
.fade-in{animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{border-radius:50%;animation:spin 0.75s linear infinite}

/* ═══ DASHBOARD ═══ */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
.stat-icon-wrap{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.stat-num{font-size:25px;font-weight:800;font-family:'DM Mono',monospace;line-height:1;letter-spacing:-0.5px}
.stat-label{font-size:11px;color:var(--text3);margin-top:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

/* ═══ SCREENING CARD ═══ */
.scard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.15s;margin-bottom:8px;box-shadow:var(--shadow)}
.scard:hover{border-color:var(--accent-m);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.creator-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace}

/* ═══ STEPS ═══ */
.step-bar{display:flex;align-items:center;margin-bottom:22px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;box-shadow:var(--shadow)}
.step-dot{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;color:var(--text3)}
.step-dot.active{color:var(--accent);font-weight:600}
.step-dot.done{color:var(--green)}
.step-num{width:25px;height:25px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'DM Mono',monospace;font-weight:600;flex-shrink:0;background:var(--card)}
.step-dot.active .step-num{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 0 0 3px var(--accent-m)}
.step-dot.done .step-num{border-color:var(--green);background:var(--green);color:#fff}
.step-label{white-space:nowrap;font-size:12px}
.step-line{flex:1;height:2px;background:var(--border);margin:0 9px;border-radius:1px}
.step-line.done{background:var(--green)}

/* ═══ FILE UPLOAD ═══ */
.drop-zone{border:2px dashed var(--border2);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--surface)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:var(--accent-l)}
.file-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.mode-tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;border:1.5px solid var(--border);background:var(--card);color:var(--text2)}
.mode-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}

/* ═══ PROGRESS ═══ */
.prog-track{background:var(--surface);border-radius:20px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width 0.4s}

/* ═══ CHAT ═══ */
.chat-wrap{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.chat-msgs{overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:160px;flex:1}
.chat-msg{padding:10px 13px;border-radius:10px;font-size:13px;line-height:1.65;max-width:88%;white-space:pre-wrap}
.chat-msg.user{background:var(--accent);color:#fff;border-radius:10px 10px 3px 10px;margin-left:auto;box-shadow:0 2px 6px rgba(79,110,247,0.3)}
.chat-msg.assistant{background:var(--card);border:1px solid var(--border);border-radius:10px 10px 10px 3px;box-shadow:var(--shadow)}
.chat-msg.assistant-typing{color:var(--text3);display:flex;align-items:center;gap:8px}
.chat-row{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border);background:var(--card)}
.chat-input{flex:1;background:var(--input-bg);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Manrope',sans-serif;font-size:13px;outline:none;transition:all 0.15s}
.chat-input:focus{border-color:var(--accent);background:var(--input-focus)}

/* ═══ FORMULA ═══ */
.f-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px}
.f-bar-track{background:var(--border);border-radius:4px;height:5px;margin:7px 0}
.f-bar-fill{height:5px;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--purple));transition:width 0.5s}
.f-band{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);background:var(--card);padding:2px 7px;border-radius:4px;border:1px solid var(--border)}

/* ═══ TABLE ═══ */
.c-table{width:100%;border-collapse:collapse}
.c-table thead{position:sticky;top:0;z-index:1}
.c-table th{text-align:left;padding:10px 13px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;border-bottom:2px solid var(--border);background:var(--surface);white-space:nowrap}
.c-table td{padding:11px 13px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
.c-table tbody tr{transition:background 0.1s;cursor:pointer}
.c-table tbody tr:hover td{background:var(--accent-l)}
.c-table tbody tr.expanded td{background:var(--accent-l)}
.score-badge{display:inline-flex;align-items:center;justify-content:center;width:44px;height:26px;border-radius:6px;font-family:'DM Mono',monospace;font-size:12px;font-weight:700}
.s-ex{background:var(--green-l);color:var(--green);border:1px solid var(--green-m)}
.s-go{background:var(--accent-l);color:var(--accent);border:1px solid var(--accent-m)}
.s-fa{background:var(--yellow-l);color:var(--yellow);border:1px solid var(--yellow)}
.s-po{background:var(--red-l);color:var(--red);border:1px solid var(--red)}
.tier-top{background:var(--green-l);border:1px solid var(--green-m);color:var(--green);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.tier-bot{background:var(--surface);border:1px solid var(--border);color:var(--text3);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;white-space:nowrap}

/* ═══ EXPAND PANEL ═══ */
.exp-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:5px;box-shadow:var(--shadow-md)}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px}
.tab{padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.bd-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.bd-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px}
.q-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px}
.role-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}

/* ═══ PREV JD CARD ═══ */

const {useState,useEffect,useRef,useCallback}=React;

/* ── Single AI function — Groq/Llama for everything ── */
async function ai(sys, usr, maxT = 4096, temp = 0.1) {
  const r = await fetch("/api/openai", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      messages: [
        { role: "system", content: sys },
        { role: "user", content: usr }
      ],
      max_tokens: maxT,
      temperature: temp
    })
  });

  const d = await r.json();

  if (d.error) {
    console.error("API ERROR:", d.error);
    return null;   // 🔥 important
  }

  if (!d.choices || !d.choices[0]) {
    return null;
  }

  return d.choices[0].message.content;
}
const aiOpenai=ai;

/* ── Robust JSON parser — handles truncated output ── */
function toJ(raw){
  let t=raw.replace(/```(?:json)?\s*\n?/g,"").replace(/```\s*/g,"").trim();
  const s=t.indexOf("{");
  if(s===-1) throw new Error("No JSON found in response");
  t=t.slice(s);
  // If JSON is truncated (no closing brace) try to close it
  const opens=(t.match(/{/g)||[]).length;
  const closes=(t.match(/}/g)||[]).length;
  if(opens>closes){
    // Remove any trailing incomplete key/value
    t=t.replace(/,\s*"[^"]*"\s*:\s*[^,}\]]*$/,"");
    t=t.replace(/,\s*"[^"]*"\s*:?\s*$/,"");
    // Close any unclosed arrays
    const arrOpen=(t.match(/\[/g)||[]).length;
    const arrClose=(t.match(/\]/g)||[]).length;
    for(let i=0;i<arrOpen-arrClose;i++) t+="]";
    // Close missing braces
    const stillOpen=(t.match(/{/g)||[]).length-(t.match(/}/g)||[]).length;
    for(let i=0;i<stillOpen;i++) t+="}";
  }
  const e=t.lastIndexOf("}");
  if(e!==-1) t=t.slice(0,e+1);
  try{return JSON.parse(t);}catch(_){}
  t=t.replace(/,\s*([}\]])/g,"$1")
     .replace(/([{,]\s*)(\w+)\s*:/g,'$1"$2":')
     .replace(/:\s*'([^']*)'/g,':"$1"')
     .replace(/\\'/g,"'")
     .replace(/[\u0000-\u001F\u007F-\u009F]/g," ");
  try{return JSON.parse(t);}catch(e2){throw new Error("JSON parse failed: "+e2.message);}
}

/* ── File extractors ── */
async function pdfLib(){
  if(window.pdfjsLib) return window.pdfjsLib;
  await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  return window.pdfjsLib;
}
async function readPDF(f){
  try{
    const lib=await pdfLib();
    const pdf=await lib.getDocument({data:await f.arrayBuffer()}).promise;
    let pages=[];
    for(let i=1;i<=pdf.numPages;i++){
      const pg=await pdf.getPage(i);
      const ct=await pg.getTextContent();

      // Sort by Y descending (top of page first), then X ascending (left to right)
      // This correctly handles two-column layouts where PDF.js returns items in render order
      const items=ct.items.filter(x=>x.str&&x.str.trim());
      items.sort((a,b)=>{
        const dy=b.transform[5]-a.transform[5];
        if(Math.abs(dy)>4) return dy;       // different rows: top first
        return a.transform[4]-b.transform[4]; // same row: left first
      });

      // Group into lines (items within 4 units of each other in Y = same line)
      const lines=[];
      let curLine=[];
      let lastY=null;
      for(const item of items){
        const y=item.transform[5];
        if(lastY===null||Math.abs(y-lastY)>4){
          if(curLine.length) lines.push(curLine.join(" "));
          curLine=[item.str];
          lastY=y;
        }else{
          curLine.push(item.str);
        }
      }
      if(curLine.length) lines.push(curLine.join(" "));
      pages.push(lines.join("\n"));
    }
    return pages.join("\n\n").trim();
  }catch{return "";}
}
async function readDOCX(f){try{const r=await mammoth.extractRawText({arrayBuffer:await f.arrayBuffer()});return r.value.trim();}catch{return "";}}
async function readFile(f){const n=f.name.toLowerCase();if(n.endsWith(".pdf")||f.type==="application/pdf")return readPDF(f);if(n.endsWith(".docx")||n.endsWith(".doc"))return readDOCX(f);return f.text();}

async function analyzeJD(jd){
  const sys="You are an expert HR analyst. Extract every detail from this job description. Return ONLY valid JSON, no markdown.";
  const schema=`{"jobTitle":"","department":"","company":"","location":"","employmentType":"Full-time|Part-time|Contract","experienceRange":{"min":0,"max":0},"requiredSkills":[],"preferredSkills":[],"education":{"required":"","preferred":"","fields":[]},"domain":"e.g. Backend Development, ML/AI, Frontend, DevOps, Data Science, Mobile, Full Stack, QA, Cloud","subDomain":"","certifications":{"required":[],"preferred":[]},"responsibilities":[],"seniority":"Junior|Mid|Senior|Lead|Manager","techStack":[],"softSkills":[],"keyRequirements":[],"salaryRange":"if mentioned or empty string","summary":"2-sentence summary of the role and what makes an ideal candidate"}`;

/* Full in-depth resume parse — single pass, robust schema */
/* Pre-process raw resume text — strip noise before passing to AI */
function preprocessResume(raw){
  let t = raw;
  // Strip confidential/restricted headers (Oracle, company watermarks)
  t = t.replace(/confidential\s*[-\u2013]\s*\w+\s*\w*\s*restricted[^\n]*/gi, '');
  t = t.replace(/confidential[^\n]{0,30}\n/gi, '');
  t = t.replace(/for\s+internal\s+use\s+only[^\n]*/gi, '');
  // Strip repeated blank lines left by removals
  t = t.replace(/\n{3,}/g, '\n\n').trim();
  return t;
}

async function parseResume(text){
  // Pre-process before anything else
  text = preprocessResume(text);
  const sys=`You are an expert resume parser. Extract EVERYTHING from this resume with maximum depth and accuracy.

CRITICAL — READ EVERY LINE of the resume without skipping anything:

RULE 1 — SKILLS FROM ALL SECTIONS (most important):
Extract technologies/tools/skills mentioned ANYWHERE — not just the Skills section:
• Explicit skills section → include all
• Work experience bullets → if a bullet says "built REST APIs using Node.js", add Node.js to technical[], REST API to technical[]
• "Deployed application on AWS EC2" → add AWS to cloud[], EC2 to cloud[]
• "Used Git for version control" → add Git to tools[] even if not in skills section
• "Wrote unit tests with Jest" → add Jest to tools[], Testing to methodologies[]
• Project descriptions → every technology mentioned goes into skills
• Certifications → technologies implied by cert (AWS cert → AWS in cloud[])
• TABLE FORMAT SKILLS — many resumes list skills in a table like "Skill Name | Version | Last Used | Experience". Extract the skill name from every row of such tables (e.g. "WebLogic | 12c | 2024 | 5y 5m" → WebLogic in tools[])
• "Skill Used : Weblogic, Node.Js, IIS Server" in project details → extract all into tools[]

RULE 2 — INDIRECT SKILL/DOMAIN INFERENCE (read between the lines):
If the explicit technology name is NOT mentioned but the work implies it:
• "reduced model inference latency" → ML/AI work, add "ML Inference" to technical[]
• "implemented recommendation engine" → ML/AI, add "Recommendation Systems"
• "processed 10M events/day" → likely Kafka/streaming, add "High Volume Processing"
• "containerized the application" → Docker, add Docker to tools[]
• "blue-green deployments" → DevOps, add "CI/CD", "Deployment Automation"
• "designed database schema for 50 tables" → Database design, add to technical[]
• "optimized slow queries" → SQL optimization, add to technical[]
• "A/B tested UI changes" → Frontend/Product

RULE 3 — PER-ROLE DOMAIN (IGNORE JOB TITLES completely):
For EACH experience entry, decide the domain from what they ACTUALLY DID:
• "Software Developer" who wrote client proposals + no coding mentioned → Business Analysis
• "Consultant" who built Java microservices → Backend Development
• "Analyst" who built ML models in Python → ML/AI
• "Associate" who built React UIs → Frontend Development
Mixed role: someone who spent 60% on backend + 40% on ML → roleDomain = "Backend Development / ML/AI"
Write actualWork as: "Built [specific thing] using [tech] at [company]"

RULE 4 — EXPERIENCE YEARS (be precise):
• If dates given: calculate exactly. "Jan 2020 – Mar 2022" = 2.2 years
• If only years: "2020–2022" = 2 years
• Sum ALL roles for totalExperience (no gaps, just sum of all role durations)
• If current role has no end date, calculate up to present (2024)
• MULTIPLE EXPERIENCE ENTRIES: create a SEPARATE entry in experience[] for EVERY job role listed. Do not merge or skip any role. A candidate with 4 jobs must have 4 entries.
• Each entry must have its own technologies[], actualWork, and roleDomain based on THAT specific role's bullets — not a mix across all roles

RULE 5 — DEPTH PER SKILL:
Based on action verbs and duration, classify each significant skill:
• "led", "architected", "3+ years" → expert
• "built", "designed", "implemented" → working  
• "used", "assisted with", "familiar with" → exposure
Store in skillDepth array.

RULE 6 — COMPLETENESS:
Never leave experience[].technologies empty if ANY tech appears in that role's description.
Never leave projects[].technologies empty if project description mentions any tech.
Return ONLY valid JSON. No markdown fences. No explanation outside JSON.`;

  const schema='{"name":"","email":"","phone":"","linkedin":"","location":"","totalExperience":0,"currentRole":"","currentCompany":"","education":[{"degree":"","field":"","institution":"","year":0}],"experience":[{"company":"","role":"","years":0,"from":"","to":"","technologies":[],"actualWork":"","roleDomain":"","depthLevel":"","achievements":[]}],"skills":{"technical":[],"tools":[],"languages":[],"frameworks":[],"databases":[],"cloud":[],"methodologies":[]},"skillDepth":[{"skill":"","depth":"exposure|working|expert","evidenceFrom":""}],"projects":[{"name":"","technologies":[],"impact":""}],"certifications":[],"inferredDomain":"","domainEvidence":"","allDomains":[],"careerLevel":"","keyStrengths":[],"redFlags":[]}'


  const resumeText = preprocessResume(text);
  // Smart truncate for Groq — Llama 3.3 handles 8k output tokens max
  // Keep full text up to 6000 chars (enough for any resume)
  const truncated = resumeText.length > 6000
    ? resumeText.slice(0, 400) + "\n\n" + resumeText.slice(resumeText.search(/experience|work|employment/i) || 400)
    : resumeText;
  const finalText = truncated.slice(0, 5000); // ~1250 tokens — keeps total under 6k/min limit

  return toJ(await ai(
    sys,
    "Parse this resume completely. Extract skills from EVERY section including experience bullets and project descriptions.\n\nRESUME:\n"+finalText+"\n\nReturn ONLY valid JSON, no markdown:\n"+schema,
    3500, 0.1
  ));
}

/* buildFormula: uses full chat HISTORY so model remembers all priorities */
async function buildFormula(jdR,chatHistory,prevFormula){
  const sys=`You are an expert HR scoring formula designer with MEMORY.

MEMORY RULES — CRITICAL:
1. Read ALL HR messages in order (chronological)
2. Later messages REFINE or ADD TO earlier ones — they do NOT replace them unless HR explicitly says so
3. If HR said "experience is top priority" and later says "also make projects equally important" → BOTH get equal highest weight
4. If HR says "keep X same, change Y" → keep X exactly as current weight, only change Y
5. If HR says "same points" or "equal weight" for multiple criteria → assign EXACTLY equal maxPoints
6. Build the formula as the CUMULATIVE result of every message HR has sent

PRIORITY LANGUAGE MAPPING:
- "highest priority / most important / first priority" → 28-35 pts
- "same as [other criterion]" → exactly equal points
- "second priority / also important" → 18-25 pts  
- "somewhat important / third" → 10-15 pts
- "low priority / minor" → 5-8 pts
- "doesn't matter / skip" → 3 pts (still include)

EXAMPLES:
- "experience and skills same highest priority, rest lower" → experience=30, skills_match=30, remaining 40 split across 4
- "keep projects, skills, experience same and highest" → all three get equal top weight (~27 pts each), remaining 19 split across 3
- HR previously had experience=30, now says "reduce experience, give more to education" → reduce experience, increase education, keep rest

MUST sum to exactly 100. All 6 keys required.
Return ONLY valid JSON. No markdown outside JSON.`;

  const hrMsgs=chatHistory.filter(m=>m.role==="user");
  const prevNote=prevFormula
    ? "CURRENT formula weights (only change what HR explicitly asked to change):\n"+JSON.stringify(prevFormula.criteria?.map(c=>({key:c.key,name:c.name,pts:c.maxPoints})))
    : "No previous formula. Build from scratch.";

  const usr=`Design a 100-point scoring formula as the CUMULATIVE result of this entire conversation.

JOB: ${jdR.jobTitle} (${jdR.domain})
Experience required: ${jdR.experienceRange?.min}-${jdR.experienceRange?.max} years
Required skills: ${(jdR.requiredSkills||[]).join(", ")}
Tech stack: ${(jdR.techStack||[]).join(", ")}

${prevNote}

COMPLETE HR CONVERSATION (all ${hrMsgs.length} messages — honor ALL of them cumulatively):
${hrMsgs.map((m,i)=>`[Message ${i+1}]: "${m.content}"`).join("\n")}

Return this JSON:
{
  "criteria":[{
    "key":"experience|skills_match|education|domain_match|certifications|projects_quality",
    "name":"",
    "maxPoints":0,
    "priority":1,
    "bands":[
      {"label":"Below minimum","condition":"below required threshold","multiplier":0.0},
      {"label":"At minimum","condition":"meets minimum requirement","multiplier":0.5},
      {"label":"Ideal range","condition":"perfectly within JD range","multiplier":1.0},
      {"label":"Slightly over","condition":"up to 2 years / 20% over ideal","multiplier":0.6},
      {"label":"Way over","condition":"significantly exceeds requirement","multiplier":0.25}
    ],
    "rationale":"why this weight reflects the cumulative HR priorities"
  }],
  "totalPoints":100,
  "rationale":"explain how this formula reflects ALL HR inputs across the full conversation",
  "tieBreaker":"what to use when two candidates have equal scores"
}
Include all 6 criteria keys. Must sum to exactly 100.`;

  return toJ(await ai(sys,usr,3500,0.1));
}

async function scoreOne(cand,formula,jdR){
  const cd=cand.parsedData||{};

  // Defensive: if totalExperience is 0 but we have experience entries, estimate it
  if((!cd.totalExperience||cd.totalExperience===0)&&(cd.experience||[]).length>0){
    const totalFromRoles=(cd.experience||[]).reduce((s,e)=>s+(e.years||0),0);
    if(totalFromRoles>0) cd.totalExperience=parseFloat(totalFromRoles.toFixed(1));
  }

  // Defensive: merge all skills from experience technologies if skills are empty
  const expTechs=(cd.experience||[]).flatMap(e=>e.technologies||[]);
  const projTechs=(cd.projects||[]).flatMap(p=>p.technologies||[]);
  if((!cd.skills?.technical||cd.skills.technical.length===0)&&expTechs.length>0){
    cd.skills=cd.skills||{};
    cd.skills.technical=[...new Set(expTechs)];
  }
  const allSkills=[
    ...(cd.skills?.technical||[]),...(cd.skills?.tools||[]),...(cd.skills?.frameworks||[]),
    ...(cd.skills?.databases||[]),...(cd.skills?.cloud||[]),...(cd.skills?.languages||[]),
    ...(cd.skills?.methodologies||[]),
    ...(cd.experience||[]).flatMap(e=>e.technologies||[]),
    ...(cd.projects||[]).flatMap(p=>p.technologies||[])
  ].map(s=>s.toLowerCase()).filter((v,i,a)=>a.indexOf(v)===i);

  const sys=`You are a precise, deterministic HR scoring engine.
RULES:
1. Apply formula bands EXACTLY. score = Math.round(maxPoints * multiplier). No rounding differently.
2. skills_match: check allSkills (merged from all sections). ALSO use skillDepth — a candidate with "expert" depth in a required skill should score higher on skills_match than one with only "exposure". Adjust matchPct accordingly.
3. experience: compare totalExperience against JD range bands exactly.
4. domain_match: use domainEvidence which contains per-role analysis. If the candidate's PRIMARY domain strongly matches JD domain, full marks. If secondary domain matches, partial. If no overlap, low.
5. projects_quality: use indirectDomainSignals from projects to find hidden relevant work even if not explicitly labelled.
6. Same inputs → ALWAYS same output. Be fully deterministic.
7. Return ONLY valid JSON.`;

  const usr=`Score this candidate deterministically.

JD: ${jdR.jobTitle} | ${jdR.domain} | Exp: ${jdR.experienceRange?.min}-${jdR.experienceRange?.max}yr
Required: ${JSON.stringify(jdR.requiredSkills||[])} | Stack: ${JSON.stringify(jdR.techStack||[])}

Formula: ${JSON.stringify(formula.criteria?.map(c=>({key:c.key,max:c.maxPoints,bands:c.bands})))}

Candidate:

async function batch(items,fn,size=2,onProg,delay=2000){
  // Groq free tier: 30 req/min, 6000 tokens/min
  // Strategy: process one at a time for heavy tasks, 2-sec gap between each
  // On rate limit: exponential backoff — 15s, 30s, 60s
  const out=[];
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  const isRateErr=msg=>msg&&(
    msg.includes("429")||
    msg.toLowerCase().includes("rate limit")||
    msg.toLowerCase().includes("rate_limit")||
    msg.toLowerCase().includes("too many")||
    msg.toLowerCase().includes("tokens per minute")||
    msg.toLowerCase().includes("requests per minute")
  );
  const isDailyErr=msg=>msg&&(
    msg.toLowerCase().includes("tokens per day")||
    msg.toLowerCase().includes("daily")||
    msg.toLowerCase().includes("quota")||
    msg.toLowerCase().includes("exceeded your current")
  );

  for(let i=0;i<items.length;i+=size){
  const chunk=items.slice(i,i+size);

  const results=await Promise.all(chunk.map(async(item,j)=>{
    
    // smaller stagger
    if(j>0) await sleep(j*300);

    for(let attempt=0;attempt<4;attempt++){
      try{
        const res=await fn(item,i+j);
        onProg?.(i+j+1,items.length);
        return res;

      }catch(e){
        const msg=e.message||"";

        if(isDailyErr(msg)) throw e;

        if(isRateErr(msg)&&attempt<3){
          const wait=[2000,4000,8000][attempt]||8000;
          console.warn(`Retry in ${wait/1000}s`);
          await sleep(wait);
          continue;
        }

        onProg?.(i+j+1,items.length);
        throw e;
      }
    }
  }));

  results.forEach(x=>out.push(x));

  // shorter batch delay
  if(i+size<items.length) await sleep(500);
}
  return out;
}

/* Build CSV rows for a set of candidates with a screening title column */
function buildCSVRows(candidates,screeningTitle,includeTitle=false){
  const ranked=[...candidates].sort((a,b)=>(b.score?.totalScore||0)-(a.score?.totalScore||0));
  const half=Math.ceil(ranked.length/2);
  return ranked.map((c,i)=>[
    ...(includeTitle?[screeningTitle]:[]),
    i+1,c.parsedData?.name||"-",c.parsedData?.email||"-",c.parsedData?.phone||"-",
    c.score?.totalScore??"-",c.score?.fit||"-",c.score?.hiringRecommendation||"-",
    i<half?"Top 50%":"Bottom 50%",c.parsedData?.inferredDomain||"-",c.parsedData?.totalExperience||"-",
    (c.score?.strengths||[]).join("; "),(c.score?.gaps||[]).join("; "),
    (c.suggestedRoles?.suggestedRoles||[]).map(r=>r.title).join("; "),
    c.parsedData?.linkedin||"-",c.hrNote||"-"
  ]);
}
function makeCSV(headers,rows){
  return[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
}
function downloadCSV(content,filename){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([content],{type:"text/csv"}));
  a.download=filename;a.click();
}
/* Single screening */
function exportCSV(candidates,title){
  const H=["Rank","Name","Email","Phone","Score","Fit","Recommendation","Tier","Domain","Experience","Strengths","Gaps","Suggested Roles","LinkedIn","HR Notes"];
  downloadCSV(makeCSV(H,buildCSVRows(candidates,title)),`TalentIQ_${(title||"results").replace(/\s+/g,"_")}.csv`);
}
/* All screenings combined */
function exportAllCSV(screenings){
  const H=["Screening","Rank","Name","Email","Phone","Score","Fit","Recommendation","Tier","Domain","Experience","Strengths","Gaps","Suggested Roles"];
  const rows=screenings.flatMap(s=>buildCSVRows(s.candidates||[],s.jdTitle,true));
  downloadCSV(makeCSV(H,rows),`TalentIQ_All_Screenings_${new Date().toISOString().slice(0,10)}.csv`);
}
/* Per-HR screenings */
function exportByHRCSV(screenings,email){
  const mine=screenings.filter(s=>s.createdByEmail===email);
  const H=["Screening","Rank","Name","Email","Phone","Score","Fit","Recommendation","Tier","Domain","Experience","Strengths","Gaps","Suggested Roles"];
  const rows=mine.flatMap(s=>buildCSVRows(s.candidates||[],s.jdTitle,true));
  downloadCSV(makeCSV(H,rows),`TalentIQ_${email.split("@")[0]}_Screenings.csv`);
}

const avatarColors=["#4F6EF7","#7C3AED","#0A9272","#C07A10","#E0382A","#0891B2","#D946EF","#0369A1"];
const aColor=e=>avatarColors[(e||"").charCodeAt(0)%avatarColors.length];
const ini=e=>((e||"").split("@")[0].slice(0,2).toUpperCase());
const sc=s=>s>=80?"s-ex":s>=60?"s-go":s>=40?"s-fa":"s-po";
const fc=f=>f==="Excellent"?"badge-green":f==="Good"?"badge-blue":f==="Fair"?"badge-yellow":"badge-red";
const normPhone=p=>(p||"").replace(/\D/g,"").slice(-10);
const normName=n=>(n||"").toLowerCase().replace(/\s+/g," ").trim();

/* Check if a parsed identity matches any candidate in existing screenings */
function findDuplicateInHistory(identity,screenings){
  const ph=normPhone(identity.phone); const nm=normName(identity.name);
  if(!ph&&!nm) return null;
  for(const scrn of screenings){
    for(const c of (scrn.candidates||[])){
      const ep=normPhone(c.parsedData?.phone); const en=normName(c.parsedData?.name);
      if(ph&&ep&&ph===ep&&nm&&en&&nm===en){
        return{screeningTitle:scrn.jdTitle,screeningDate:scrn.createdAt,candidateName:c.parsedData?.name,score:c.score?.totalScore};
      }
    }
  }
  return null;
}

            <span className="step-label">{s.l}</span>
          </div>
          {i<steps.length-1&&<div className={`step-line${step>s.n?" done":""}`}/>}
        </React.Fragment>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════
   FORMULA CARD
══════════════════════════════════════════ */
function FormulaCard({formula}){
  if(!formula?.criteria) return null;
  const total=formula.criteria.reduce((s,c)=>s+c.maxPoints,0);
  return(
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:10,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"1px"}}>Scoring Formula</span>
        <span className="badge badge-blue">{total} pts total</span>
      </div>
      {formula.criteria.sort((a,b)=>b.maxPoints-a.maxPoints).map(c=>(
        <div key={c.key} className="f-row">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontWeight:700,fontSize:13,color:"var(--text)"}}>{c.name}</span>
              {c.priority===1&&<span className="badge badge-blue" style={{fontSize:9}}>Top Priority</span>}
            </div>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:700,color:"var(--accent)"}}>{c.maxPoints} pts</span>
          </div>
          <div className="f-bar-track"><div className="f-bar-fill" style={{width:c.maxPoints+"%"}}/></div>
          <p style={{fontSize:11,color:"var(--text2)",lineHeight:1.5,marginBottom:6}}>{c.rationale}</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
            {c.bands?.map((b,i)=><span key={i} className="f-band">{b.label}: {Math.round(b.multiplier*100)}%</span>)}
          </div>
        </div>
      ))}
      {formula.rationale&&<div className="info-box" style={{fontSize:12,marginTop:8}}>{formula.rationale}</div>}
    </div>
  );
}

/* ══════════════════════════════════════════
