function SCard({s,user,onClick,onExport,onDelete}){
  const isMe=s.createdByEmail===user?.email;
  const avg=s.candidates?.length?Math.round(s.candidates.reduce((a,c)=>a+(c.score?.totalScore||0),0)/s.candidates.length):0;
  const handleDelete=(e)=>{
    e.stopPropagation();
    if(window.confirm('Delete "'+s.jdTitle+'"?\n\nThis will permanently remove this screening and all its candidate data from the database. This cannot be undone.'))
      onDelete();
  };
  return(
    <div className="scard" onClick={onClick}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
            <span style={{fontWeight:700,fontSize:14,color:"var(--text)"}}>{s.jdTitle}</span>
            <div className="creator-pill" style={{background:isMe?"var(--green-l)":"var(--purple-l)",border:"1px solid "+(isMe?"var(--green-m)":"var(--purple)"),color:isMe?"var(--green)":"var(--purple)"}}>
              <span style={{width:5,height:5,borderRadius:"50%",background:"currentColor",display:"inline-block"}}/>
              {s.createdByEmail?.split("@")[0]}{isMe?" (you)":""}
            </div>
          </div>
          <div style={{fontSize:11,color:"var(--text3)",fontFamily:"'DM Mono',monospace",marginBottom:7}}>{new Date(s.createdAt).toLocaleString()} · {s.candidates?.length||0} candidates · avg {avg}/100</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {s.jdReqs?.domain&&<span className="badge badge-blue" style={{fontSize:10}}>{s.jdReqs.domain}</span>}
            {s.jdReqs?.seniority&&<span className="badge badge-purple" style={{fontSize:10}}>{s.jdReqs.seniority}</span>}
            {s.jdReqs?.experienceRange&&<span className="badge badge-gray" style={{fontSize:10}}>{s.jdReqs.experienceRange.min}-{s.jdReqs.experienceRange.max}yr exp</span>}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}>
          <span className="badge badge-green" style={{fontSize:10}}>completed</span>
          {onExport&&<button className="btn btn-ghost btn-xs" onClick={e=>{e.stopPropagation();onExport();}}>↓ CSV</button>}
          {isMe&&onDelete&&<button className="btn btn-xs" style={{background:"var(--red-l)",color:"var(--red)",border:"1px solid var(--red)",fontSize:10}} onClick={handleDelete}>🗑 Delete</button>}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════ */
function App(){
  /* theme */
  const [theme,setTheme]=useState(()=>localStorage.getItem("tiq_theme")||"light");
  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);localStorage.setItem("tiq_theme",theme);},[theme]);
  const toggleTheme=()=>setTheme(t=>t==="light"?"dark":"light");

  /* auth */
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  useEffect(()=>{
    const c=sb();
    if(!c){setAuthLoading(false);return;}
    c.auth.getSession().then(({data})=>{setUser(data.session?.user||null);setAuthLoading(false);});
    const{data:{subscription}}=c.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
    return()=>subscription.unsubscribe();
  },[]);
  const logout=async()=>{await sb()?.auth.signOut();_sb=null;setUser(null);};

  /* navigation & screenings */
  const [view,setView]=useState("dashboard");
  const [screenings,setScreenings]=useState([]);
  const [loadingSc,setLoadingSc]=useState(false);

  /* screening flow */
  const [step,setStep]=useState(1);
  const [jdFile,setJdFile]=useState(null),[jdText,setJdText]=useState(""),[jdMode,setJdMode]=useState("file");
  const [jdExtracting,setJdExtracting]=useState(false),[jdReqs,setJdReqs]=useState(null);
  const jdFileRef=useRef();
  const [resumeFiles,setResumeFiles]=useState([]),[candidates,setCandidates]=useState([]);
  const [dragging,setDragging]=useState(false); const resumeRef=useRef();

  /* formula & chat — chatHistory holds full conversation for memory */
  const [formula,setFormula]=useState(null),[fApproved,setFApproved]=useState(false);
  const [chatHistory,setChatHistory]=useState([]); // [{role,content}] — the memory
  const [chatDisplay,setChatDisplay]=useState([]); // [{role,content,ts}] — UI display
  const [chatInput,setChatInput]=useState("");
  const chatRef=useRef();

  /* processing */
  const [loading,setLoading]=useState(false),[loadMsg,setLoadMsg]=useState("");
  const [prog,setProg]=useState({done:0,total:0,phase:""});

  /* results */
  const [selCand,setSelCand]=useState(null),[candTab,setCandTab]=useState("bd");

  /* settings */
  const [sbUrlI,setSbUrlI]=useState(localStorage.getItem("tiq_sb_url")||"");
  const [sbAnonI,setSbAnonI]=useState(localStorage.getItem("tiq_sb_anon")||"");

  /* modals */
  const [showNewModal,setShowNewModal]=useState(false);
  const [dupModal,setDupModal]=useState(null); // {duplicates, texts, onConfirm}

  useEffect(()=>{if(user){loadAll();}},[user]);
  useEffect(()=>{if(chatRef.current) chatRef.current.scrollTop=chatRef.current.scrollHeight;},[chatDisplay]);

  const loadAll=async()=>{setLoadingSc(true);const s=await dbLoad();setScreenings(s);setLoadingSc(false);};
  const handleDelete=async(id)=>{
    try{
      await dbDelete(id);
      setScreenings(prev=>prev.filter(s=>s.id!==id));
    }catch(e){alert("Delete failed: "+e.message);}
  };
  const nav=(v)=>{setView(v);if(["dashboard","history","team"].includes(v))loadAll();};
  const saveSb=()=>{localStorage.setItem("tiq_sb_url",sbUrlI);localStorage.setItem("tiq_sb_anon",sbAnonI);_sb=null;alert("Saved. Reload to reconnect.");};

  const reset=()=>{
    setStep(1);setJdFile(null);setJdText("");setJdReqs(null);
    setResumeFiles([]);setCandidates([]);setFormula(null);setFApproved(false);
    setChatHistory([]);setChatDisplay([]);setChatInput("");
    setLoading(false);setSelCand(null);setProg({done:0,total:0,phase:""});
  };

  /* clicking + New Screening */
  const handleNewScreening=()=>{
    reset();
    if(screenings.length>0) setShowNewModal(true);
    else{setView("new");}
  };
  const handleFresh=()=>{setShowNewModal(false);reset();setView("new");};

  const handlePrevSelect=(scrn,what)=>{
    reset();
    // Load whatever was selected
    if(what==="jd"||what==="both"){
      setJdReqs(scrn.jdReqs);
      setJdText("[Loaded from: "+scrn.jdTitle+"]");
    }
    if(what==="formula"||what==="both") setFormula(scrn.formula);
    // ALWAYS land on Step 2 — HR must upload new resumes every time
    setStep(2);
    // Pre-fill chat for formula step
    if(what==="both"||what==="formula"){
      const weights=(scrn.formula?.criteria||[])
        .slice().sort((a,b)=>b.maxPoints-a.maxPoints)
        .map(c=>c.name+": "+c.maxPoints+"pts").join(" · ");
      const line1=(what==="both")
        ?"JD loaded: "+scrn.jdReqs?.jobTitle+" ("+scrn.jdReqs?.domain+") · "+scrn.jdReqs?.experienceRange?.min+"-"+scrn.jdReqs?.experienceRange?.max+"yr\n"
        :"";
      const line2="Formula weights: "+weights;
      const initMsg={role:"assistant",content:"Loaded "+(what==="both"?"JD + formula":"formula")+" from \""+scrn.jdTitle+"\"\n\n"+line1+line2+"\n\nUpload your new resumes below. After parsing you can refine the formula or approve it as-is."};
      setChatDisplay([initMsg]);
      setChatHistory([{role:"assistant",content:initMsg.content}]);
    }
    setView("new");
  };

  /* JD file handling */
  const handleJdFile=async(file)=>{
    const n=file.name.toLowerCase();
    if(!n.endsWith(".pdf")&&!n.endsWith(".docx")&&!n.endsWith(".doc")&&!n.endsWith(".txt")){alert("Please upload PDF, DOCX, DOC, or TXT.");return;}
    setJdFile(file);setJdExtracting(true);
    try{setJdText(await readFile(file));}catch(e){alert("Could not extract: "+e.message);}
    setJdExtracting(false);
  };

  const handleAnalyzeJD=async()=>{
    if(!jdText.trim()) return;
    setLoading(true);setLoadMsg("Analyzing job description...");
    try{setJdReqs(await analyzeJD(jdText));}catch(e){alert("Error: "+e.message);}
    setLoading(false);setLoadMsg("");
  };

  const handleResumeFiles=(files)=>{
    const arr=Array.from(files).filter(f=>{const n=f.name.toLowerCase();return n.endsWith(".pdf")||n.endsWith(".txt")||n.endsWith(".doc")||n.endsWith(".docx");});
    setResumeFiles(prev=>{const ex=new Set(prev.map(f=>f.name));return[...prev,...arr.filter(f=>!ex.has(f.name))].slice(0,30);});
  };

  /* Parse resumes with duplicate detection against Supabase history */
  const handleParseResumes=async()=>{
    if(!resumeFiles.length) return;
    setLoading(true);

    // Step 1: Extract text
    setProg({done:0,total:resumeFiles.length,phase:"Extracting text from files..."});
    const texts=[];
    for(let i=0;i<resumeFiles.length;i++){
      let t="";try{t=await readFile(resumeFiles[i]);}catch{}
      texts.push({file:resumeFiles[i],text:t});
      setProg({done:i+1,total:resumeFiles.length,phase:"Extracting text..."});
    }

    // Step 2: Quick identity extraction for duplicate check
    setProg({done:0,total:texts.length,phase:"Checking for duplicates against history..."});
    const identities=await batch(texts,async({text},idx)=>{
      const id=await quickExtractIdentity(text);
      setProg(p=>({...p,done:idx+1}));
      return id;
    },5);

    // Step 3: Check against ALL existing screenings
    const dupFound=[];
    texts.forEach(({file},i)=>{
      const id=identities[i];
      const match=findDuplicateInHistory(id,screenings);
      if(match) dupFound.push({fileName:file.name,identity:id,matchInfo:match,fileIndex:i});
    });

    setLoading(false);

    // Step 4: If duplicates found, show modal
    if(dupFound.length>0){
      setDupModal({
        duplicates:dupFound,
        texts,
        onConfirm:async(resolvedDups)=>{
          setDupModal(null);
          const skipSet=new Set(resolvedDups.filter(d=>!d.include).map(d=>d.fileIndex));
          const filtered=texts.filter((_,i)=>!skipSet.has(i));
          await doParseResumes(filtered);
        },
        onClose:()=>{setDupModal(null);}
      });
    }else{
      await doParseResumes(texts);
    }
  };

  /* actual full parse after duplicate resolution */
  const doParseResumes=async(texts)=>{
    setLoading(true);
    setProg({done:0,total:texts.length,phase:"Parsing resumes — 1 min gap to stay within rate limits..."});

    // Track if daily quota is exhausted — stop early and skip remaining
    let quotaExhausted=false;
    const isQuotaErr=(msg)=>msg&&(
      msg.toLowerCase().includes("exceeded your current quota")||
      msg.toLowerCase().includes("quota")||
      msg.toLowerCase().includes("tpd")||
      msg.toLowerCase().includes("tokens per day")
    );
    const cleanFileName=(name)=>{
      let n=name
        .replace(/^Naukri_/i,"")          // strip Naukri_ prefix
        .replace(/_\d+y_\d+m_?\.pdf$/i,"") // strip _2y_0m_.pdf suffix
        .replace(/\.pdf$/i,"")             // strip .pdf
        .replace(/_/g," ")                 // underscores to spaces
        .replace(/\[\d+y\s*\d*m?\]/g,"")  // strip [2y 0m] experience tags
        .replace(/\s{2,}/g," ")            // collapse spaces
        .trim();
      // Capitalise first letter of each word
      return n.replace(/\b\w/g,c=>c.toUpperCase());
    };

    const allParsed=await batch(texts,async({file,text},idx)=>{
      // Always return SOMETHING — no single resume should block the whole batch
      const fallback=(warning)=>({
        id:"c"+Date.now()+"_"+idx,fileName:file.name,
        parsedData:{
          name:cleanFileName(file.name),email:"N/A",phone:"N/A",totalExperience:0,
          currentRole:"",currentCompany:"",
          skills:{technical:[],tools:[],languages:[],frameworks:[],databases:[],cloud:[],soft:[],methodologies:[]},
          experience:[],projects:[],certifications:[],skillDepth:[],
          inferredDomain:"Unknown",allDomains:[],careerLevel:"Unknown",
          keyStrengths:[],redFlags:[],_parseWarning:warning
        }
      });

      // Skip if daily quota already gone
      if(quotaExhausted) return fallback("Skipped — daily token quota exhausted. Try again tomorrow.");

      // TIER 1: Full deep parse (7000 chars, full schema)
      try{
        const p=await parseResume(text);
        if(!p.name||p.name==="N/A"||p.name.length<2) p.name=cleanFileName(file.name);
        p.skills=p.skills||{};
        ["technical","tools","languages","frameworks","databases","cloud","soft","methodologies"]
          .forEach(k=>{if(!Array.isArray(p.skills[k]))p.skills[k]=[];});
        p.experience=Array.isArray(p.experience)?p.experience:[];
        p.skillDepth=Array.isArray(p.skillDepth)?p.skillDepth:[];
        return{id:"c"+Date.now()+"_"+idx,fileName:file.name,parsedData:p};
      }catch(e1){
        console.warn("Tier 1 parse failed for",file.name,":",e1.message);
        if(isQuotaErr(e1.message)){quotaExhausted=true;return fallback("Daily token quota exhausted.");}

        // TIER 2: Lean parse — 3500 chars, minimal schema, still gets core info
        try{
          await new Promise(r=>setTimeout(r,20000)); // wait 20s before Tier 2 retry
          const lean=await aiOpenai(
            "You are a resume parser. Extract key info. Return ONLY valid JSON.",
            "Parse this resume.\n\nRESUME:\n"+text.slice(0,3500)+"\n\nReturn JSON:\n{\"name\":\"\",\"email\":\"\",\"phone\":\"\",\"totalExperience\":0,\"currentRole\":\"\",\"currentCompany\":\"\",\"inferredDomain\":\"\",\"experience\":[{\"company\":\"\",\"role\":\"\",\"years\":0,\"technologies\":[],\"actualWork\":\"\",\"roleDomain\":\"\"}],\"skills\":{\"technical\":[],\"tools\":[],\"languages\":[],\"frameworks\":[]},\"certifications\":[],\"keyStrengths\":[]}",
            1500,0.1
          );
          const p=toJ(lean);
          if(!p.name||p.name.length<2) p.name=cleanFileName(file.name);
          p.skills=p.skills||{};
          ["technical","tools","languages","frameworks","databases","cloud","soft","methodologies"]
            .forEach(k=>{if(!Array.isArray(p.skills[k]))p.skills[k]=[];});
          p.experience=Array.isArray(p.experience)?p.experience:[];
          p.skillDepth=[];p.allDomains=[p.inferredDomain].filter(Boolean);
          p._parseWarning="Simplified parse — some depth details may be missing";
          return{id:"c"+Date.now()+"_"+idx,fileName:file.name,parsedData:p};
        }catch(e2){
          console.warn("Tier 2 parse failed for",file.name,":",e2.message);
          if(isQuotaErr(e2.message)){quotaExhausted=true;return fallback("Daily token quota exhausted.");}

          // TIER 3: Absolute minimum — just name, years, skills list
          try{
            await new Promise(r=>setTimeout(r,40000)); // wait 40s before Tier 3
            const mini=await aiOpenai(
              "Extract info from this resume. JSON only.",
              "Resume:\n"+text.slice(0,2000)+"\n\nReturn:{\"name\":\"\",\"email\":\"\",\"phone\":\"\",\"totalExperience\":0,\"skills\":[],\"currentRole\":\"\"}",
              500,0
            );
            const raw=toJ(mini);
            const skills=Array.isArray(raw.skills)?raw.skills:[];
            return{id:"c"+Date.now()+"_"+idx,fileName:file.name,parsedData:{
              name:raw.name||cleanFileName(file.name),
              email:raw.email||"N/A",phone:raw.phone||"N/A",
              totalExperience:raw.totalExperience||0,
              currentRole:raw.currentRole||"",currentCompany:"",
              skills:{technical:skills,tools:[],languages:[],frameworks:[],databases:[],cloud:[],soft:[],methodologies:[]},
              experience:[],projects:[],certifications:[],skillDepth:[],
              inferredDomain:"",allDomains:[],careerLevel:"Unknown",keyStrengths:[],redFlags:[],
              _parseWarning:"Minimal parse (Tier 3) — only basic info extracted."
            }};
          }catch(e3){
            if(isQuotaErr(e3.message)) quotaExhausted=true;
            return fallback("All parse attempts failed: "+e3.message.slice(0,80));
          }
        }
      }
    },1,(d,t)=>setProg({done:d,total:t,phase:"Parsing resumes..."}),60000);


    // In-batch dedup (same name+phone within this upload)
    const deduped=[];let dupCount=0;
    const normPhone=p=>(p||"").replace(/\D/g,"").slice(-10);
    const normName=n=>(n||"").toLowerCase().replace(/\s+/g," ").trim();
    for(const cand of allParsed){
      const ph=normPhone(cand.parsedData?.phone),nm=normName(cand.parsedData?.name);
      const isDup=deduped.some(e=>ph&&normPhone(e.parsedData?.phone)===ph&&nm&&normName(e.parsedData?.name)===nm);
      if(isDup){const ex=deduped.find(e=>normPhone(e.parsedData?.phone)===ph&&normName(e.parsedData?.name)===nm);if(ex)ex.duplicateFiles=[...(ex.duplicateFiles||[]),cand.fileName];dupCount++;}
      else deduped.push(cand);
    }

    if(deduped.length===0){
      setLoading(false);
      // All resumes were either duplicates or failed — stop and notify
      alert("⚠ No resumes to screen.\n\nAll " + allParsed.length + " uploaded resume(s) were identified as duplicates of candidates already in your screening history.\n\nPlease upload new resumes to continue.");
      setStep(2); // stay on upload step
      return;
    }
    setCandidates(deduped);setLoading(false);setStep(3);
    const dupMsg=dupCount>0?`\n\n⚠️ ${dupCount} duplicate(s) within this batch also removed.`:"";
    const initMsg=`✅ Successfully parsed ${deduped.length} resumes with deep extraction!${dupMsg}\n\nNow let's design the scoring formula for **${jdReqs.jobTitle}**.\n\nDescribe your priorities — I'll remember everything you say across messages:\n\n• "Experience and skills are most important, equally weighted"\n• "Keep projects, skills, and experience at same top priority"\n• "Experience first, then skills, education is secondary"\n\nDistribute 100 pts across: Work Experience · Skills Match · Domain Match · Education · Projects · Certifications`;
    setChatDisplay([{role:"assistant",content:initMsg,ts:new Date().toISOString()}]);
    setChatHistory([{role:"assistant",content:initMsg}]);
  };

  /* Chat — accumulates history for model memory */
  const sendChat=async()=>{
    if(!chatInput.trim()||loading) return;
    const msg=chatInput.trim();setChatInput("");

    const newHistory=[...chatHistory,{role:"user",content:msg}];
    const newDisplay=[...chatDisplay,{role:"user",content:msg,ts:new Date().toISOString()}];
    setChatHistory(newHistory);setChatDisplay(newDisplay);
    setLoading(true);setLoadMsg("Designing formula with memory...");

    try{
      const f=await buildFormula(jdReqs,newHistory,formula||null);
      setFormula(f);
      const reply=`Here's the updated formula based on everything you've told me so far.\n\nTotal: ${f.criteria?.reduce((s,c)=>s+c.maxPoints,0)||0}/100 points\nTop criteria: ${f.criteria?.sort((a,b)=>b.maxPoints-a.maxPoints).slice(0,3).map(c=>c.name+" ("+c.maxPoints+"pts)").join(", ")}\n\nReview on the left — approve to start scoring, or keep refining.`;
      const updatedHistory=[...newHistory,{role:"assistant",content:reply}];
      const updatedDisplay=[...newDisplay,{role:"assistant",content:reply,ts:new Date().toISOString()}];
      setChatHistory(updatedHistory);setChatDisplay(updatedDisplay);
    }catch(e){
      const errMsg="Error: "+e.message;
      setChatHistory([...newHistory,{role:"assistant",content:errMsg}]);
      setChatDisplay([...newDisplay,{role:"assistant",content:errMsg,ts:new Date().toISOString()}]);
    }
    setLoading(false);setLoadMsg("");
  };

  const approveFormula=async()=>{
    setFApproved(true);
    const msg="✅ Formula approved! Scoring all "+candidates.length+" candidates now — this may take a few minutes...";
    setChatDisplay(p=>[...p,{role:"assistant",content:msg,ts:new Date().toISOString()}]);
    setStep(4);await runScoring();
  };

  const runScoring=async()=>{
    setLoading(true);
    setProg({done:0,total:candidates.length,phase:"Scoring candidates..."});
    const scored=await batch(candidates,async(cand)=>{
      try{return{...cand,score:await scoreOne(cand,formula,jdReqs)};}
      catch(e){
        console.warn("Score failed for",cand.parsedData?.name,":",e?.message);
        return{...cand,score:{totalScore:0,breakdown:{},strengths:[],gaps:["Scoring failed: "+( e?.message||"unknown error")],fit:"Poor",hiringRecommendation:"Not Recommended",_error:e?.message}};
      }
    },1,(d,t)=>setProg({done:d,total:t,phase:"Scoring candidates..."}));

    const sorted=[...scored].sort((a,b)=>(b.score?.totalScore||0)-(a.score?.totalScore||0));
    const half=Math.ceil(sorted.length/2);

    // Role suggestions for bottom 50% only (no interview questions)
    setProg({done:0,total:sorted.length-half,phase:"Generating role suggestions..."});
    const botR=await batch(sorted.slice(half),async(cand)=>{
      try{return{...cand,suggestedRoles:await suggestR(cand,jdReqs)};}
      catch{return{...cand,suggestedRoles:{suggestedRoles:[]}};}
    },2,(d,t)=>setProg({done:d,total:t,phase:"Generating role suggestions..."}));

    const final=[...sorted.slice(0,half),...botR];
    setCandidates(final);
    const scrn={id:"scr_"+Date.now(),jdTitle:jdReqs.jobTitle,jdReqs,formula,candidates:final,createdAt:new Date().toISOString(),status:"completed"};
    try{await dbSave(scrn,user.id,user.email);await loadAll();}
    catch(e){alert("⚠ Screening done but could not save:\n"+e.message);}
    setLoading(false);setStep(5);
  };

  const ranked=[...candidates].sort((a,b)=>(b.score?.totalScore||0)-(a.score?.totalScore||0));
  const half=Math.ceil(ranked.length/2);
  const avgScore=ranked.length?Math.round(ranked.reduce((s,c)=>s+(c.score?.totalScore||0),0)/ranked.length):0;

  if(authLoading) return <div style={{width:"100%",height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}><div className="spinner" style={{width:32,height:32,border:"3px solid var(--border2)",borderTopColor:"var(--accent)"}}/></div>;
  if(!user) return <AuthScreen onAuth={u=>setUser(u)}/>;

  return(
    <div style={{display:"flex",width:"100%",height:"100vh"}}>
      {/* ── MODALS ── */}
      {showNewModal&&<NewScreeningModal screenings={screenings} onFresh={handleFresh} onSelect={(s,w)=>{setShowNewModal(false);handlePrevSelect(s,w);}} onClose={()=>setShowNewModal(false)}/>}
      {dupModal&&<DuplicateModal duplicates={dupModal.duplicates} onConfirm={dupModal.onConfirm} onClose={dupModal.onClose}/>}

      {/* ── SIDEBAR ── */}
      <div className="sidebar">
        <div className="sidebar-top">
          <div className="logo-mark">
            <div className="logo-icon">T</div>
            <div><div className="logo-name">TalentIQ</div><div className="logo-sub">Team Edition</div></div>
          </div>
        </div>
        <div className="nav">
          <div className="nav-sec">Workspace</div>
          <div className={"nav-item"+(view==="dashboard"?" active":"")} onClick={()=>nav("dashboard")}><span className="nav-icon">⊞</span>Dashboard</div>
          {view==="new"&&<div className="nav-item active"><span className="nav-icon">◎</span>Active Screening</div>}
          <div className={"nav-item"+(view==="history"?" active":"")} onClick={()=>nav("history")}><span className="nav-icon">☰</span>All Screenings</div>
          <div className={"nav-item"+(view==="team"?" active":"")} onClick={()=>nav("team")}><span className="nav-icon">⊙</span>Team Activity</div>
          <div className="nav-sec">Account</div>
          <div className={"nav-item"+(view==="settings"?" active":"")} onClick={()=>nav("settings")}><span className="nav-icon">⚙</span>Settings</div>
        </div>
        <button className="nav-new" onClick={handleNewScreening}>+ New Screening</button>
        <div className="model-pill">
          <div className="model-pill-name">GPT-4o-mini (OpenAI)</div>
        </div>
        <div className="user-panel">
          <div className="u-avatar" style={{background:aColor(user.email)}}>{ini(user.email)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="u-name">{user.user_metadata?.full_name||user.email.split("@")[0]}</div>
            <div className="u-email">{user.email}</div>
          </div>
          <button className="logout-btn" onClick={logout} title="Sign out">⎋</button>
        </div>
      </div>

      {/* ── MAIN ── */}
      <div className="main">
        <div className="topbar">
          {view==="dashboard"&&<><div className="topbar-title">Dashboard</div><span className="topbar-sep">·</span><div className="topbar-sub">Team Overview</div></>}
          {view==="new"&&<><div className="topbar-title">{jdReqs?jdReqs.jobTitle:"New Screening"}</div>{jdReqs&&<><span className="topbar-sep">·</span><div className="topbar-sub">Step {step}/5 · {jdReqs.domain}</div></>}</>}
          {view==="history"&&<><div className="topbar-title">All Screenings</div><span className="topbar-sep">·</span><div className="topbar-sub">{screenings.length} total</div></>}
          {view==="team"&&<><div className="topbar-title">Team Activity</div><span className="topbar-sep">·</span><div className="topbar-sub">Per-member breakdown</div></>}
          {view==="settings"&&<><div className="topbar-title">Settings</div><span className="topbar-sep">·</span><div className="topbar-sub">Configuration</div></>}
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
            {view==="new"&&step===5&&<button className="btn btn-ghost btn-sm" onClick={()=>exportCSV(candidates,jdReqs?.jobTitle)}>↓ Export CSV</button>}
            <button className="theme-toggle" onClick={toggleTheme}>
              {theme==="light"?"🌙 Dark":"☀️ Light"}
            </button>
          </div>
        </div>

        <div className="content">

          {/* ── DASHBOARD ── */}
          {view === "dashboard" && (
            <div className="fade-in">
              <div className="stat-grid">
                {[
                  {icon:"📋",l:"Total Screenings",v:screenings.length,c:"var(--accent)",bg:"var(--accent-l)"},
                  {icon:"👥",l:"Candidates Screened",v:screenings.reduce((s,x)=>s+(x.candidates?.length||0),0),c:"var(--purple)",bg:"var(--purple-l)"},
                  {icon:"✅",l:"My Screenings",v:screenings.filter(x=>x.createdByEmail===user.email).length,c:"var(--green)",bg:"var(--green-l)"},
                  {icon:"⭐",l:"Team Avg Score",v:(screenings.reduce((s,x)=>{const c=x.candidates?.filter(c=>c.score);return c?.length?s+c.reduce((ss,c)=>ss+(c.score?.totalScore||0),0)/c.length:s;},0)/Math.max(screenings.filter(x=>x.candidates?.some(c=>c.score)).length,1)||0).toFixed(0)+"/100",c:"var(--yellow)",bg:"var(--yellow-l)"}
                ].map((s,i)=>(
                  <div key={i} className="stat-card">
                    <div className="stat-icon-wrap" style={{background:s.bg}}>
                      <span>{s.icon}</span>
                    </div>
                    <div className="stat-num" style={{color:s.c}}>{s.v}</div>
                    <div className="stat-label">{s.l}</div>
                  </div>
                ))}
              </div>

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div className="sec-title" style={{margin:0}}>Recent Screenings</div>
                {screenings.length>0 && (
                  <button className="btn btn-ghost btn-sm" onClick={()=>nav("history")}>
                    View all →
                  </button>
                )}
              </div>

              {loadingSc ? (
                <div style={{textAlign:"center",padding:"40px",color:"var(--text3)"}}>
                  Loading from database...
                </div>
              ) : screenings.length === 0 ? (
                <div style={{textAlign:"center",padding:"50px 20px",color:"var(--text3)"}}>
                  <div style={{fontSize:40,marginBottom:12}}>📋</div>
                  <div style={{fontWeight:700,fontSize:15,color:"var(--text)",marginBottom:6}}>
                    No screenings yet
                  </div>
                  <div style={{fontSize:13}}>
                    Start a new screening — it will be visible to your whole team.
                  </div>
                  <button className="nav-new" onClick={handleNewScreening}>
                    + New Screening
                  </button>
                </div>
              ) : (
                screenings.slice(0,4).map(s => (
                  <SCard
                    key={s.id}
                    s={s}
                    user={user}
                    onClick={()=>{
                      setCandidates(s.candidates||[]);
                      setJdReqs(s.jdReqs);
                      setFormula(s.formula);
                      setFApproved(true);
                      setStep(5);
                      setView("new");
                    }}
                  />
                ))
              )}

            </div>
          )}

          {/* ── ALL SCREENINGS ── */}
          {view==="history"&&<div className="fade-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <div><div className="sec-title" style={{margin:0}}>All Team Screenings</div><div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>Shared across all HR members · you can delete only your own</div></div>
              <button className="btn btn-ghost btn-sm" onClick={loadAll} disabled={loadingSc}>{loadingSc?"↻ Loading...":"↻ Refresh"}</button>
            </div>
            {screenings.length>0&&<div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:10}}>Download CSV Reports</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <button className="btn btn-outline btn-sm" onClick={()=>exportAllCSV(screenings)}>
                  ↓ All Screenings Combined
                </button>
                <div style={{height:20,width:1,background:"var(--border)"}}/>
                <span style={{fontSize:11,color:"var(--text3)",fontWeight:600}}>Per HR:</span>
                {Array.from(new Set(screenings.map(x=>x.createdByEmail).filter(Boolean))).map(email=>(
                  <button key={email} className="btn btn-ghost btn-sm" onClick={()=>exportByHRCSV(screenings,email)}>
                    ↓ {email.split("@")[0]}{email===user.email?" (you)":""}
                  </button>
                ))}
              </div>
            </div>}
            {loadingSc?<div style={{textAlign:"center",padding:"40px",color:"var(--text3)"}}>Loading...</div>:
            screenings.length===0?<div style={{textAlign:"center",padding:"50px 20px",color:"var(--text3)"}}><div style={{fontSize:40,marginBottom:12}}>📁</div><div style={{fontWeight:700,fontSize:15,color:"var(--text)"}}>No screenings yet</div></div>:
            screenings.map(s=><SCard key={s.id} s={s} user={user}
              onClick={()=>{setCandidates(s.candidates||[]);setJdReqs(s.jdReqs);setFormula(s.formula);setFApproved(true);setStep(5);setView("new");}}
              onExport={()=>exportCSV(s.candidates||[],s.jdTitle)}
              onDelete={()=>handleDelete(s.id)}
            />)}
          </div>}

          {/* ── TEAM ── */}
          {view==="team"&&<div className="fade-in">
            <div className="sec-title">Team Activity</div>
            {Array.from(new Set(screenings.map(x=>x.createdByEmail).filter(Boolean))).map(email=>{
              const mine=screenings.filter(s=>s.createdByEmail===email);
              const tc=mine.reduce((s,x)=>s+(x.candidates?.length||0),0);
              const avg=tc?Math.round(mine.reduce((s,x)=>s+(x.candidates||[]).reduce((ss,c)=>ss+(c.score?.totalScore||0),0),0)/tc):0;
              return(
                <div key={email} className="card" style={{marginBottom:14}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                    <div style={{width:38,height:38,borderRadius:10,background:aColor(email),color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13}}>{ini(email)}</div>
                    <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:"var(--text)"}}>{email.split("@")[0]}</div><div style={{fontSize:11,color:"var(--text3)",fontFamily:"'DM Mono',monospace"}}>{email}</div></div>
                    {email===user.email&&<span className="badge badge-green">You</span>}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
                    {[{l:"Screenings",v:mine.length,c:"var(--accent)"},{l:"Candidates",v:tc,c:"var(--purple)"},{l:"Avg Score",v:avg+"/100",c:"var(--green)"}].map((st,i)=>(
                      <div key={i} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:9,padding:"12px 14px"}}>
                        <div style={{fontSize:20,fontWeight:800,fontFamily:"'DM Mono',monospace",color:st.c}}>{st.v}</div>
                        <div style={{fontSize:10,color:"var(--text3)",marginTop:3,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px"}}>{st.l}</div>
                      </div>
                    ))}
                  </div>
                  {mine.map(s=>(
                    <div key={s.id} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8,padding:"9px 12px",marginBottom:5,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}} onClick={()=>{setCandidates(s.candidates||[]);setJdReqs(s.jdReqs);setFormula(s.formula);setFApproved(true);setStep(5);setView("new");}}>
                      <div><div style={{fontWeight:600,fontSize:13,color:"var(--text)"}}>{s.jdTitle}</div><div style={{fontSize:10,color:"var(--text3)",fontFamily:"'DM Mono',monospace",marginTop:1}}>{new Date(s.createdAt).toLocaleDateString()} · {s.candidates?.length||0} candidates</div></div>
                      <span className="badge badge-blue" style={{fontSize:9}}>{s.jdReqs?.domain}</span>
                    </div>
                  ))}
                </div>
              );
            })}
            {screenings.length===0&&<div style={{textAlign:"center",padding:"50px 20px",color:"var(--text3)"}}><div style={{fontSize:40,marginBottom:12}}>👥</div><div style={{fontWeight:700,fontSize:15,color:"var(--text)"}}>No activity yet</div></div>}
          </div>}

          {/* ── SETTINGS ── */}
          {view==="settings"&&<div className="fade-in" style={{maxWidth:560}}>
            <div className="sec-title">Settings</div>
            <div className="card" style={{marginBottom:14}}>
              <div className="card-hdr"><div className="card-title">AI Models — Dual Setup</div></div>
              <div style={{display:"flex",alignItems:"center",gap:12,paddingBottom:10}}>
                <div style={{width:36,height:36,borderRadius:9,background:"var(--green-l)",border:"1px solid var(--green-m)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🦙</div>
                <div>
                  <div style={{fontWeight:700,fontSize:14,fontFamily:"'DM Mono',monospace",color:"var(--text)"}}>llama-3.3-70b-versatile</div>
                  <div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>Meta Llama 3.3 70B via Groq · <span style={{color:"var(--green)",fontWeight:700}}>100% Free</span></div>
                </div>
                <span className="badge badge-green" style={{marginLeft:"auto"}}>Active</span>
              </div>
              <div className="success-box" style={{fontSize:12}}>Free limits: <strong>100,000 tokens/day · 30 req/min</strong> · 1 min gap between resumes prevents rate limit errors.</div>
            </div>
            <div className="card" style={{marginBottom:14}}>
              <div className="card-hdr"><div className="card-title">Appearance</div></div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0"}}>
                <div><div style={{fontWeight:600,fontSize:14,color:"var(--text)"}}>Theme</div><div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>Currently: {theme==="light"?"Light mode":"Dark mode"}</div></div>
                <button className="theme-toggle" onClick={toggleTheme} style={{padding:"8px 16px",fontSize:13}}>{theme==="light"?"Switch to Dark 🌙":"Switch to Light ☀️"}</button>
              </div>
            </div>
            <div className="card">
              <div className="card-hdr"><div className="card-title">Account</div></div>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                <div style={{width:36,height:36,borderRadius:9,background:aColor(user.email),color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13}}>{ini(user.email)}</div>
                <div><div style={{fontWeight:700,color:"var(--text)"}}>{user.user_metadata?.full_name||user.email.split("@")[0]}</div><div style={{fontSize:12,color:"var(--text3)",fontFamily:"'DM Mono',monospace"}}>{user.email}</div></div>
              </div>
              <button className="btn btn-danger btn-sm" onClick={logout}>Sign Out</button>
            </div>
          </div>}

          {/* ── NEW SCREENING ── */}
          {view==="new"&&<div className="fade-in">
            <StepBar step={step}/>

            {/* STEP 1 — JD */}
            {step===1 && ( <div style={{display:"grid",gap:16,maxWidth:700}}>
              <div className="card">
                <div className="card-hdr"><div className="card-title">Job Description</div></div>
                <div style={{display:"flex",gap:6,marginBottom:16}}>
                  {["file","paste"].map(m=><button key={m} className={"mode-tab"+(jdMode===m?" active":"")} onClick={()=>setJdMode(m)}>{m==="file"?"📎 Upload File (PDF / DOCX)":"✏️ Paste Text"}</button>)}
                </div>
                {jdMode==="file"&&(!jdFile?(
                  <div className={"drop-zone"+(dragging?" drag-over":"")} onClick={()=>jdFileRef.current?.click()} onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);if(e.dataTransfer.files[0])handleJdFile(e.dataTransfer.files[0]);}}>
                    <div style={{fontSize:28,marginBottom:8}}>📄</div>
                    <div style={{fontWeight:600,fontSize:14,marginBottom:4,color:"var(--text)"}}>Drop JD file here or click to browse</div>
                    <div style={{fontSize:12,color:"var(--text3)"}}>PDF, DOCX, DOC, TXT supported</div>
                    <input ref={jdFileRef} type="file" accept=".pdf,.docx,.doc,.txt" style={{display:"none"}} onChange={e=>e.target.files[0]&&handleJdFile(e.target.files[0])}/>
                  </div>
                ):(
                  <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:9,padding:"12px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <div style={{fontWeight:600,fontSize:14,display:"flex",alignItems:"center",gap:7}}>{jdFile.name.endsWith(".pdf")?"📕":"📝"} {jdFile.name}</div>
                      <button className="btn btn-danger btn-xs" onClick={()=>{setJdFile(null);setJdText("");}}>Remove</button>
                    </div>
                    <div style={{fontSize:11,color:"var(--text3)",fontFamily:"'DM Mono',monospace"}}>{(jdFile.size/1024).toFixed(0)} KB</div>
                    {jdExtracting&&<div style={{color:"var(--accent)",fontSize:12,marginTop:6,display:"flex",alignItems:"center",gap:6}}><div className="spinner" style={{width:12,height:12,border:"2px solid var(--accent-m)",borderTopColor:"var(--accent)"}}/> Extracting text...</div>}
                    {jdText&&!jdExtracting&&<div style={{color:"var(--green)",fontSize:12,marginTop:6,fontWeight:600}}>✓ {jdText.length.toLocaleString()} characters extracted</div>}
                  </div>
                ))}
                {jdMode==="paste"&&<textarea className="input textarea" placeholder="Paste the complete job description here..." value={jdText} onChange={e=>setJdText(e.target.value)}/>}
                <div style={{marginTop:14,display:"flex",gap:8,alignItems:"center"}}>
                  <button className="btn btn-primary" onClick={handleAnalyzeJD} disabled={!jdText.trim()||loading||jdExtracting}>{loading?"Analyzing...":"Analyze JD with AI →"}</button>
                  {loading&&<span style={{fontSize:12,color:"var(--text3)",fontFamily:"'DM Mono',monospace"}}>{loadMsg}</span>}
                </div>
              </div>
              {jdReqs&&<div className="card fade-in">
                <div className="card-hdr"><div className="card-title">Extracted Requirements</div><span className="badge badge-green" style={{fontSize:10}}>AI Analysis Complete</span></div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:14}}>
                  {[{l:"Role",v:<span style={{fontWeight:700,fontSize:14,color:"var(--text)"}}>{jdReqs.jobTitle}</span>},{l:"Domain",v:<span className="badge badge-blue">{jdReqs.domain}</span>},{l:"Experience",v:<span style={{fontFamily:"'DM Mono',monospace",color:"var(--accent)",fontWeight:700,fontSize:14}}>{jdReqs.experienceRange?.min}–{jdReqs.experienceRange?.max} yrs</span>},{l:"Seniority",v:<span className="badge badge-purple">{jdReqs.seniority}</span>},{l:"Company",v:<span style={{fontSize:13,color:"var(--text)"}}>{jdReqs.company||"—"}</span>},{l:"Employment",v:<span className="badge badge-gray">{jdReqs.employmentType||"Full-time"}</span>}].map((it,i)=>(
                    <div key={i}><div style={{fontSize:9,color:"var(--text3)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:5}}>{it.l}</div>{it.v}</div>
                  ))}
                </div>
                {jdReqs.summary&&<div className="info-box" style={{marginBottom:12,fontSize:13}}>{jdReqs.summary}</div>}
                {[{l:"Required Skills",items:jdReqs.requiredSkills||[],cls:"badge-green"},{l:"Preferred Skills",items:jdReqs.preferredSkills||[],cls:"badge-yellow"},{l:"Tech Stack",items:jdReqs.techStack||[],cls:"badge-purple"}].filter(g=>g.items.length>0).map((g,i)=>(
                  <div key={i} style={{marginBottom:12}}>
                    <div style={{fontSize:9,color:"var(--text3)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>{g.l}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{g.items.map((s,j)=><span key={j} className={"badge "+g.cls} style={{fontSize:11}}>{s}</span>)}</div>
                  </div>
                ))}
                <button className="btn btn-primary" onClick={()=>setStep(2)}>Continue → Upload Resumes</button>
              </div>}
            </div>)}

            {/* STEP 2 — Resumes */}
            {step===2&&<div style={{maxWidth:640}}>
              <div className="card">
                <div className="card-hdr"><div className="card-title">Upload Candidate Resumes</div><span className="badge badge-gray">{resumeFiles.length}/30 files</span></div>
                <div className={"drop-zone"+(dragging?" drag-over":"")} onClick={()=>resumeRef.current?.click()} onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);handleResumeFiles(e.dataTransfer.files);}}>
                  <div style={{fontSize:28,marginBottom:8}}>📄</div>
                  <div style={{fontWeight:600,fontSize:14,marginBottom:4,color:"var(--text)"}}>Drop resumes here or click to browse</div>
                  <div style={{fontSize:12,color:"var(--text3)"}}>PDF, DOCX, TXT · Max 30 files · Duplicates will be detected</div>
                  <input ref={resumeRef} type="file" multiple accept=".pdf,.txt,.doc,.docx" style={{display:"none"}} onChange={e=>handleResumeFiles(e.target.files)}/>
                </div>
                {resumeFiles.length>0&&<div style={{marginTop:12}}>
                  <div style={{maxHeight:180,overflowY:"auto",display:"grid",gap:4}}>
                    {resumeFiles.map((f,i)=>(
                      <div key={i} className="file-item">
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--text2)"}}>{f.name.endsWith(".pdf")?"📕":"📝"} {f.name}</span>
                        <div style={{display:"flex",gap:8,alignItems:"center"}}>
                          <span style={{fontSize:10,color:"var(--text3)"}}>{(f.size/1024).toFixed(0)} KB</span>
                          <button style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:13}} onClick={()=>setResumeFiles(p=>p.filter((_,j)=>j!==i))}>✕</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>}
                {loading&&<div style={{marginTop:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text3)",fontFamily:"'DM Mono',monospace",marginBottom:6}}><span>{prog.phase}</span><span>{prog.done}/{prog.total}</span></div>
                  <div className="prog-track"><div className="prog-fill" style={{width:(prog.total?Math.round((prog.done/prog.total)*100):0)+"%"}}/></div>
                </div>}
                <div style={{marginTop:16,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setStep(1)}>← Back</button>
                  <button className="btn btn-primary" onClick={()=>{
                    handleParseResumes();
                  }} disabled={!resumeFiles.length||loading}>{loading?"Processing...":"Parse & Check Duplicates →"}</button>
                </div>
              </div>
            </div>}

            {/* STEP 3 — Formula Chat */}
            {step===3&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,height:"calc(100vh - 186px)"}}>
              <div style={{display:"flex",flexDirection:"column",gap:10,overflow:"hidden"}}>
                <div className="card" style={{padding:12,flexShrink:0}}>
                  <div style={{fontSize:9,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:7}}>Parsed — {candidates.length} Candidates</div>
                  <div style={{maxHeight:150,overflowY:"auto",display:"grid",gap:3}}>
                    {candidates.map((c,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"var(--surface)",padding:"6px 10px",borderRadius:7}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontWeight:600,fontSize:12,color:"var(--text)"}}>{c.parsedData?.name||c.fileName}</span>
                          {c.duplicateFiles?.length>0&&<span title={"Duplicate of: "+c.duplicateFiles.join(", ")} className="badge badge-yellow" style={{fontSize:8,cursor:"help"}}>+{c.duplicateFiles.length} dup</span>}
                        </div>
                        <div style={{display:"flex",gap:3}}>
                          <span className="badge badge-blue" style={{fontSize:8,padding:"1px 5px"}}>{(c.parsedData?.inferredDomain||"?").split(" ").slice(0,2).join(" ")}</span>
                          <span className="badge badge-gray" style={{fontSize:8,padding:"1px 5px"}}>{c.parsedData?.totalExperience||0}yr</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                {formula&&!fApproved&&<button className="btn btn-success" style={{flexShrink:0}} onClick={approveFormula}>✓ Approve Formula & Start Scoring</button>}
                {formula&&<div style={{overflowY:"auto",flex:1}}><FormulaCard formula={formula}/></div>}
                {!formula&&<div className="info-box" style={{fontSize:12}}>💬 Tell me your scoring priorities in the chat. I'll remember everything you say across messages.</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.8px"}}>Formula Designer · Chat with Memory</div>
                  <span className="badge badge-gray" style={{fontSize:9}}>{chatHistory.filter(m=>m.role==="user").length} messages remembered</span>
                </div>
                <div className="chat-wrap" style={{flex:1}}>
                  <div className="chat-msgs" ref={chatRef}>
                    {chatDisplay.map((m,i)=><div key={i} className={"chat-msg "+m.role}>{m.content}</div>)}
                    {loading&&<div className="chat-msg assistant-typing"><div className="spinner" style={{width:12,height:12,border:"2px solid var(--border2)",borderTopColor:"var(--accent)",flexShrink:0}}/>{loadMsg||"Thinking with full memory..."}</div>}
                  </div>
                  {!fApproved&&<div className="chat-row">
                    <input className="chat-input" placeholder='e.g. "keep projects and skills at same highest priority"' value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendChat()}/>
                    <button className="btn btn-primary btn-sm" onClick={sendChat} disabled={loading||!chatInput.trim()}>Send</button>
                  </div>}
                </div>
              </div>
            </div>}

            {/* STEP 4 — Processing */}
            {step===4&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:360,gap:24}}>
              <div className="spinner" style={{width:52,height:52,border:"3px solid var(--border2)",borderTopColor:"var(--accent)"}}/>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:700,color:"var(--text)",marginBottom:6}}>{prog.phase||"Processing..."}</div>
                <div style={{fontSize:12,color:"var(--text3)",fontFamily:"'DM Mono',monospace",marginBottom:14}}>{prog.done} / {prog.total} completed</div>
                <div style={{width:340,margin:"0 auto"}} className="prog-track"><div className="prog-fill" style={{width:(prog.total?Math.round((prog.done/prog.total)*100):0)+"%"}}/></div>
                <div style={{fontSize:12,color:"var(--accent)",fontFamily:"'DM Mono',monospace",marginTop:8,fontWeight:600}}>{prog.total?Math.round((prog.done/prog.total)*100):0}%</div>
              </div>
              <div className="info-box" style={{maxWidth:400,textAlign:"center",fontSize:13}}>Scoring all candidates · Interview questions for top 50% · Role suggestions for remaining 50%</div>
            </div>}

            {/* STEP 5 — Results */}
            {step===5&&<div className="fade-in">
              <div className="stat-grid" style={{marginBottom:18}}>
                {[{icon:"👤",l:"Total Candidates",v:ranked.length,c:"var(--accent)",bg:"var(--accent-l)"},{icon:"📊",l:"Average Score",v:avgScore+"/100",c:"var(--green)",bg:"var(--green-l)"},{icon:"⭐",l:"Top 50%",v:half,c:"var(--green)",bg:"var(--green-l)"},{icon:"💼",l:"Bottom 50%",v:ranked.length-half,c:"var(--text3)",bg:"var(--surface)"}].map((s,i)=>(
                  <div key={i} className="stat-card"><div className="stat-icon-wrap" style={{background:s.bg}}><span>{s.icon}</span></div><div className="stat-num" style={{color:s.c,fontSize:22}}>{s.v}</div><div className="stat-label">{s.l}</div></div>
                ))}
              </div>
              <div className="card" style={{padding:0,overflow:"hidden"}}>
                <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",background:"var(--surface)"}}>
                  <div><span style={{fontWeight:700,fontSize:13,color:"var(--text)"}}>Candidate Rankings</span><span style={{fontSize:11,color:"var(--text3)",marginLeft:8}}>click row to expand details</span></div>
                  <div style={{display:"flex",gap:6}}>
                    <span className="badge badge-green" style={{fontSize:9}}>⭐ Top 50% → LinkedIn &amp; Notes</span>
                    <span className="badge badge-gray" style={{fontSize:9}}>Bottom 50% → Role Suggestions</span>
                  </div>
                </div>
                <div style={{overflowX:"auto"}}>
                  <table className="c-table">
                    <thead><tr><th>#</th><th>Candidate</th><th>Contact</th><th>Domain</th><th>Exp</th><th>Score</th><th>Fit</th><th>Recommendation</th><th>Tier</th></tr></thead>
                    <tbody>
                      {ranked.map((c,i)=>{
                        const isTop=i<half; const isSel=selCand?.id===c.id;
                        return(<React.Fragment key={c.id}>
                          <tr className={isSel?"expanded":""} onClick={()=>{setSelCand(isSel?null:c);setCandTab("bd");}}>
                            <td style={{fontFamily:"'DM Mono',monospace",color:"var(--text3)",fontSize:11,fontWeight:600,width:34}}>{i+1}</td>
                            <td style={{fontWeight:600}}>
                              <div style={{display:"flex",alignItems:"center",gap:6}}>
                                <span>{c.parsedData?.name||c.fileName}</span>
                                {c.duplicateFiles?.length>0&&<span title={"Also submitted as:\n"+c.duplicateFiles.join("\n")} className="badge badge-yellow" style={{fontSize:9,cursor:"help"}}>📋 +{c.duplicateFiles.length} dup</span>}
                                {c.parsedData?._parseWarning&&<span title={c.parsedData._parseWarning} className="badge badge-yellow" style={{fontSize:9,cursor:"help"}}>⚠ partial</span>}
                              </div>
                            </td>
                            <td style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--text3)"}}><div>{c.parsedData?.email||"—"}</div><div style={{marginTop:2}}>{c.parsedData?.phone||"—"}</div></td>
                            <td><span className="badge badge-blue" style={{fontSize:9}}>{(c.parsedData?.inferredDomain||"—").split(" ").slice(0,3).join(" ")}</span></td>
                            <td style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600}}>{c.parsedData?.totalExperience||0}yr</td>
                            <td><span className={"score-badge "+sc(c.score?.totalScore||0)}>{c.score?.totalScore||0}</span></td>
                            <td><span className={"badge "+fc(c.score?.fit)} style={{fontSize:10}}>{c.score?.fit||"—"}</span></td>
                            <td style={{fontSize:11,color:"var(--text2)",maxWidth:150}}>{c.score?.hiringRecommendation||"—"}</td>
                            <td>{isTop?<span className="tier-top">⭐ Top 50%</span>:<span className="tier-bot">Bottom 50%</span>}</td>
                          </tr>
                          {isSel&&<tr><td colSpan={9} style={{padding:"4px 12px 12px",background:"var(--accent-l)"}}><CandPanel cand={c} tab={candTab} setTab={setCandTab} isTop={isTop} onUpdate={(updated)=>{setCandidates(prev=>prev.map(x=>x.id===updated.id?updated:x));setSelCand(updated);}}/></td></tr>}
                        </React.Fragment>);
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>}
          </div>}
        </div>
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  render(){
    if(this.state.error){
      return(
        <div style={{padding:40,fontFamily:"Manrope,sans-serif",maxWidth:600,margin:"40px auto"}}>
          <div style={{fontSize:20,fontWeight:700,color:"#E0382A",marginBottom:12}}>TalentIQ failed to start</div>
          <div style={{fontSize:13,color:"#4B5563",background:"#FEF0EF",border:"1px solid #E0382A",borderRadius:8,padding:14,fontFamily:"monospace",whiteSpace:"pre-wrap"}}>
            {this.state.error.toString()}
          </div>
          <div style={{fontSize:12,color:"#6B7280",marginTop:12}}>
            Open browser DevTools (F12) → Console tab for more details.
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
